name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            exe_ext: ""
          - os: windows-latest
            target: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            exe_ext: ".exe"
          - os: macos-15-intel
            target: macos-x86_64
            rust_target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            exe_ext: ""
          - os: macos-latest
            target: macos-arm64
            rust_target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            exe_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: anda-cli/go.mod

      - name: Build Rust binary
        run: |
          cargo build --release --locked -p anda_brain --target ${{ matrix.rust_target }}

      - name: Build Go binary
        working-directory: anda-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w" -o anda-cli${{ matrix.exe_ext }} .

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          cp "target/${{ matrix.rust_target }}/release/anda_brain${{ matrix.exe_ext }}" "release/anda_brain-${{ matrix.target }}${{ matrix.exe_ext }}"
          cp "anda-cli/anda-cli${{ matrix.exe_ext }}" "release/anda-cli-${{ matrix.target }}${{ matrix.exe_ext }}"

          for file in release/*; do
            if command -v sha256sum >/dev/null 2>&1; then
              hash="$(sha256sum "$file" | awk '{print $1}')"
            elif command -v shasum >/dev/null 2>&1; then
              hash="$(shasum -a 256 "$file" | awk '{print $1}')"
            else
              hash="$(openssl dgst -sha256 "$file" | awk '{print $NF}')"
            fi
            echo "$hash  $(basename "$file")" > "${file}.sha256"
          done
          bundle="release/anda-bundle-${{ matrix.target }}.zip"
          bundle_name="$(basename "$bundle")"
          files=(
            "anda_brain-${{ matrix.target }}${{ matrix.exe_ext }}"
            "anda_brain-${{ matrix.target }}${{ matrix.exe_ext }}.sha256"
            "anda-cli-${{ matrix.target }}${{ matrix.exe_ext }}"
            "anda-cli-${{ matrix.target }}${{ matrix.exe_ext }}.sha256"
          )

          if command -v bsdtar >/dev/null 2>&1; then
            bsdtar -a -cf "$bundle" -C release "${files[@]}"
          elif command -v zip >/dev/null 2>&1; then
            (
              cd release
              zip -q "$bundle_name" "${files[@]}"
            )
          else
            PYTHON_BIN="python3"
            if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
              PYTHON_BIN="python"
            fi
            "$PYTHON_BIN" -c 'import sys,zipfile; out=sys.argv[1]; items=sys.argv[2:]; z=zipfile.ZipFile(out,"w",zipfile.ZIP_DEFLATED); [z.write(p, p.split("/")[-1]) for p in items]; z.close()' "$bundle" "release/${files[0]}" "release/${files[1]}" "release/${files[2]}" "release/${files[3]}"
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            bundle_hash="$(sha256sum "$bundle" | awk '{print $1}')"
          elif command -v shasum >/dev/null 2>&1; then
            bundle_hash="$(shasum -a 256 "$bundle" | awk '{print $1}')"
          else
            bundle_hash="$(openssl dgst -sha256 "$bundle" | awk '{print $NF}')"
          fi
          echo "$bundle_hash  $(basename "$bundle")" > "${bundle}.sha256"

          ls -lah release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  release:
    needs: build-binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
